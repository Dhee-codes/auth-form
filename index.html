<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin Sign Up Form</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <main class="container">
        <div class="decorative">
            <div class="logo-container">
                <img src="images/odin-lined.png" alt="Logo" class="logo-img">
                <h1 class="logo">
                    ODIN
                </h1>
            </div>
        </div>
        <div class="content">
           <div>
                <p>
                    This is not a real online service! You know you need something like this in your life to help you realise your deepest dreams. <br> Sign Up now to get started.
                </p>
                <p>
                    You <span class="italic">know</span> what to do
                </p>

                <form id="signupForm" action="post" novalidate>
                    <div>
                        <p>Let's do this!</p>
                    </div>
                    <div class="fields">
                        <div>
                            <label for="fname">First Name</label>
                            <input type="text" name="fname" id="fname" required>
                            <span class="error" aria-live="polite"></span>
                        </div>
                        <div>
                            <label for="lname">Last Name</label>
                            <input type="text" name="lname" id="lname" required>
                            <span class="error" aria-live="polite"></span>
                        </div>
                        <div>
                            <label for="email">Email</label>
                            <input type="email" name="email" id="email" autocomplete="email" required>
                            <span class="error" aria-live="polite"></span>
                        </div>
                        <div>
                            <label for="phone">Phone Number</label>
                            <input type="tel" name="phone" id="phone" pattern="[0-9]{7,15}" required>
                            <span class="error" aria-live="polite"></span>
                        </div>
                        <div>
                            <label for="userPass">Password</label>
                            <input type="password" name="userPass" id="userPass" minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" autocomplete="new-password" required>
                            <div id="strength"></div>
                            <span class="error" aria-live="polite"></span>
                        </div>
                        <div>
                            <label for="confirmPass">Confirm Password</label>
                            <input type="password" name="confirmPass" id="confirmPass" minlength="8" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" autocomplete="new-password" required>
                            <span class="error" aria-live="polite"></span>
                        </div>
                    </div>
                    <div>
                        <button id="submitBtn" type="submit">Create Account</button>
                    </div>
                    <p class="foot">Already have an account? <a href="/">Login</a></p>
                </form>
           </div>
        </div>
    </main>
</body>
</html>
